services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/vidnest
      JWT_SECRET: change-me-in-real-envs
      JWT_EXPIRE: 30d
      FRONTEND_URL: http://localhost:5173
    command: npm run dev
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./Frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:5000
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
